                  '<div style="margin-top:16px;">' +
                    '<button onclick="location.reload()" style="padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:#e2e8f0;cursor:pointer;">Reload</button>' +
                  '</div>' +
                '</div>' +
              '</div>'
            );
          }
        };

        // If React never mounts, try one safe auto-reload (common after deployments with stale caches).
        setTimeout(function () {
          if (document.documentElement.dataset.appMounted === '1') return;

          try {
            var k = '__oracle_boot_reload_v1';
            if (sessionStorage.getItem(k) !== '1') {
              sessionStorage.setItem(k, '1');
              location.reload();
              return;
            }
          } catch (e) {
            // ignore
          }

          var el = document.getElementById('boot-fallback');
          if (el) {
            el.innerHTML =
              '<div style="max-width:560px;">' +
                '<div style="font-size:18px;font-weight:700;margin-bottom:8px;">Still loading…</div>' +
                '<div style="font-size:13px;opacity:.75;line-height:1.6;">If you see a blank screen, your browser may have cached an old version. Please hard refresh (Ctrl/⌘+Shift+R) or try an incognito window.</div>' +
              '</div>';
          }
        }, 8000);

        // If a global error happens before React mounts, show a helpful message (instead of black screen).
        window.addEventListener('error', function (e) {
          if (document.documentElement.dataset.appMounted === '1') return;
          if (window.__oracleBoot && window.__oracleBoot.showError) {
            window.__oracleBoot.showError((e && e.message) || 'script error');
          }
        });
        window.addEventListener('unhandledrejection', function (e) {
          if (document.documentElement.dataset.appMounted === '1') return;
          var reason = (e && e.reason && e.reason.message) ? e.reason.message : String(e && e.reason ? e.reason : 'promise rejection');
          if (window.__oracleBoot && window.__oracleBoot.showError) {
            window.__oracleBoot.showError(reason);
          }
        });
      })();
