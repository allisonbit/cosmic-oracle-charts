    <!-- Boot overlay -->
    <style>
      #app-loading-overlay{position:fixed;inset:0;z-index:2147483600;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:#F5F8FC;transition:opacity 300ms ease-out;opacity:1}
      #app-loading-overlay.ob-hide{opacity:0;pointer-events:none}
      #app-loading-overlay .ob-logo{width:88px;height:88px;border-radius:20px;object-fit:cover;box-shadow:0 10px 30px rgba(37,99,235,.18)}
      #app-loading-overlay .ob-spin{width:36px;height:36px;border-radius:9999px;border:3px solid rgba(37,99,235,.18);border-top-color:#2563eb;animation:obspin .7s linear infinite}
      @keyframes obspin{to{transform:rotate(360deg)}}
      @media (prefers-reduced-motion: reduce){#app-loading-overlay .ob-spin{animation-duration:1.6s}}
    </style>
    <noscript><style>#app-loading-overlay{display:none!important}</style></noscript>
    <div id="app-loading-overlay" role="status" aria-live="polite" aria-label="Loading Oracle Bull">
      <img src="/oracle-bot-mascot.jpg" alt="Oracle Bull" class="ob-logo" width="88" height="88" decoding="async" />
      <div class="ob-spin" aria-hidden="true"></div>
    </div>
    <script>(function(){
      try{if(localStorage.getItem('oraclebull-theme')==='dark'){var o=document.getElementById('app-loading-overlay');if(o)o.style.background='#06080f';}}catch(e){}
      function removeOverlay(){
        var o=document.getElementById('app-loading-overlay');
        if(!o) return;
        o.classList.add('ob-hide');
        setTimeout(function(){ if(o&&o.parentNode) o.parentNode.removeChild(o); },320);
      }
      window.__oracleBoot=window.__oracleBoot||{};
      window.__oracleBoot.hideOverlay=removeOverlay;
      var html=document.documentElement;
      var mo=new MutationObserver(function(){
        if(html.dataset.appMounted==='1'){ mo.disconnect(); requestAnimationFrame(removeOverlay); }
      });
      mo.observe(html,{attributes:true,attributeFilter:['data-app-mounted']});
      setTimeout(function(){ if(html.dataset.appMounted!=='1') return; removeOverlay(); },1500);
      setTimeout(function(){ removeOverlay(); },10000);
    })();</script>

    <div id="root">
      <div id="boot-fallback" role="status" aria-live="polite" style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;background:#ffffff;color:#1e293b;">
        <div style="max-width:520px;">
          <div style="font-size:14px;opacity:.6;margin-bottom:10px;">Loading…</div>
          <div style="font-size:20px;font-weight:600;letter-spacing:.2px;">Oracle Bull is starting</div>
          <div style="font-size:13px;opacity:.5;margin-top:10px;line-height:1.5;">If this stays blank, refresh the page (Ctrl/⌘+Shift+R).</div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var root = document.getElementById('root');
        function setHtml(html) { if (!root) return; root.innerHTML = html; }

        window.__oracleBoot = {
          markMounted: function () { document.documentElement.dataset.appMounted = '1'; },
          showError: function (reason) {
            document.documentElement.dataset.appMounted = '0';
            try { var _ov = document.getElementById('app-loading-overlay'); if (_ov) _ov.style.display = 'none'; } catch (e) {}
            setHtml(
              '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;background:#ffffff;color:#1e293b;">' +
                '<div style="max-width:560px;">' +
                  '<div style="font-size:18px;font-weight:700;margin-bottom:8px;">Site failed to load</div>' +
                  '<div style="font-size:13px;opacity:.75;line-height:1.6;">Please do a hard refresh (Ctrl/⌘+Shift+R) or try an incognito window.</div>' +
                  (reason ? '<div style="margin-top:10px;font-size:12px;opacity:.55;">' + String(reason).slice(0, 140) + '</div>' : '') +
                  '<div style="margin-top:16px;"><button onclick="location.reload()" style="padding:10px 14px;border-radius:10px;border:1px solid rgba(0,0,0,.12);background:rgba(0,0,0,.04);color:#1e293b;cursor:pointer;">Reload</button></div>' +
                '</div>' +
              '</div>'
            );
          }
        };

        setTimeout(function () {
          if (document.documentElement.dataset.appMounted === '1') return;
          try {
            var k = '__oracle_boot_reload_v1';
            if (sessionStorage.getItem(k) !== '1') { sessionStorage.setItem(k, '1'); location.reload(); return; }
          } catch (e) {}
          var el = document.getElementById('boot-fallback');
          if (el) el.innerHTML = '<div style="max-width:560px;"><div style="font-size:18px;font-weight:700;margin-bottom:8px;">Still loading…</div><div style="font-size:13px;opacity:.75;line-height:1.6;">Please hard refresh (Ctrl/⌘+Shift+R) or try incognito.</div></div>';
        }, 8000);

        var fatalPattern = /script error|ChunkLoadError|Loading chunk|Failed to fetch dynamically imported module|Importing a module script failed|SyntaxError.*unexpected|Cannot access .* before initialization/i;
        window.addEventListener('error', function (e) {
          if (document.documentElement.dataset.appMounted === '1') return;
          var msg = (e && e.message) || String(e || '');
          if (fatalPattern.test(msg) && window.__oracleBoot && window.__oracleBoot.showError) window.__oracleBoot.showError(msg);
        });
        window.addEventListener('unhandledrejection', function (e) {
          if (document.documentElement.dataset.appMounted === '1') return;
          var reason = (e && e.reason && e.reason.message) ? e.reason.message : String(e && e.reason ? e.reason : '');
          if (fatalPattern.test(reason) && window.__oracleBoot && window.__oracleBoot.showError) window.__oracleBoot.showError(reason);
        });
      })();
    </script>

    <script type="module" src="/src/main.tsx" onerror="window.__oracleBoot && window.__oracleBoot.showError('entry script failed')"></script>
