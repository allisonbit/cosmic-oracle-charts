# Cloudflare deploy config — used by `npx wrangler deploy` in Cloudflare's build.
# Publishes the prerendered static site in ./dist as Worker Static Assets.
#
# WHY: the project uses Vite 5, and wrangler's automatic Vite integration wants
# Vite 6. We don't need that integration at all — the site is already built into
# ./dist. Declaring [assets] tells wrangler to just upload those files, skipping
# the Vite auto-config (which is what made the deploy fail).
#
# - html_handling "drop-trailing-slash": a request for /dashboard is served 200
#   directly from /dashboard/index.html (and /dashboard/ redirects to /dashboard).
#   THIS is the core SEO fix — every clean no-slash URL (matching our sitemap and
#   canonical tags) resolves to its own prerendered page with a direct 200, instead
#   of falling back to the homepage or bouncing through a trailing-slash redirect.
# - not_found_handling "single-page-application": paths with no prerendered file
#   (e.g. /my/*, /trade) fall back to index.html so React Router handles them.
name = "cosmic-oracle-charts"
compatibility_date = "2026-06-21"

# Cloudflare Pages Git builds need an explicit output directory. Without this,
# the build can finish Vite successfully but never publish the generated site.
pages_build_output_dir = "./dist"

[assets]
directory = "./dist"
html_handling = "drop-trailing-slash"
not_found_handling = "single-page-application"
